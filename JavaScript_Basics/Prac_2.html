<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice_2</title>
</head>
<body>
    <h2>Bulb Off and on using JavaScrit</h2>

    <p>In this case JavaScrit changes the value of the src attribute of an image.</p>

    <button type="button" onclick="document.getElementById('myImage').src='/assets/bulbon.gif'">Turn on the light</button>

    <img id="myImage" src="/assets/bulboff.jpg" alt="bulb" style="width:100px">

    <button type="button" onclick="document.getElementById('myImage').src='/assets/bulboff.jpg'">Turn off the light</button>
</body>
</html>
